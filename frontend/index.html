<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocFlow</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html {
        min-height: 100%;
        background:
          radial-gradient(ellipse 800px 400px at 50% 0%, rgba(255, 255, 255, 0.025), transparent),
          #0f0f0f;
      }
      body {
        min-height: 100vh;
        margin: 0;
        background: transparent;
        color: #ededed;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      #pre-splash {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 32px;
      }
      #pre-splash-card {
        display: grid;
        justify-items: center;
        gap: 18px;
        width: min(380px, 100%);
        padding: 32px;
        border: 1px solid #262626;
        border-radius: 14px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 50%), #161616;
        box-shadow: 0 36px 80px rgba(0, 0, 0, 0.44);
        text-align: center;
      }
      #pre-wordmark {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #ededed;
        font-weight: 600;
        letter-spacing: -0.02em;
        font-size: 14px;
        margin-bottom: 0;
      }
      #pre-glyph {
        display: grid;
        width: 13px;
        gap: 3px;
      }
      #pre-glyph span {
        display: block;
        background: currentColor;
        height: 1.5px;
      }
      #pre-glyph span:nth-child(1) {
        width: 9px;
      }
      #pre-glyph span:nth-child(2) {
        width: 13px;
      }
      #pre-glyph span:nth-child(3) {
        width: 9px;
      }
      #pre-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #aaaaaa;
        font-size: 14px;
      }
      #pre-spinner {
        width: 16px;
        height: 16px;
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        border-top-color: #ededed;
        border-radius: 50%;
        animation: pre-spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      @keyframes pre-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pre-splash">
        <div id="pre-splash-card">
          <div id="pre-wordmark">
            <div id="pre-glyph">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span>DocFlow</span>
          </div>
          <div id="pre-status">
            <div id="pre-spinner"></div>
            <span>Загрузка...</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
