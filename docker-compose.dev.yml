services:
  db:
    ports:
      - "5432:5432"  # только в dev — для DataGrip и локальных тестов

  db_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow_secret
      POSTGRES_DB: docflow_test
    ports:
      - "5433:5432"
    networks:
      - docflow-network
    tmpfs:
      - /var/lib/postgresql/data  # в памяти — быстрее, данные не нужны между запусками

  backend:
    volumes:
      - ./backend:/app/backend
      - ./pipeline:/app/pipeline
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_PROXY_TARGET=http://backend:8080
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
      - WATCHPACK_POLLING=true
    ports:
      - "5173:5173"
      - "3000:5173"
    command: npm run dev
